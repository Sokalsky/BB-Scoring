workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      node: 18
      xcode: latest
      cocoapods: default
      groups:
        - app_store_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.buggerbridge.scoring
    scripts:
      - name: Install Node dependencies
        script: npm install
      - name: Build web app
        script: npm run build
      - name: Install Capacitor iOS platform
        script: npx cap add ios
      - name: Sync web assets to iOS
        script: npx cap sync ios
      - name: Install CocoaPods
        script: cd ios/App && pod install
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Bugger Bridge Testers
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
